<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Bài Học - Thầy Tráng</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --bg: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); }
        
        .header { background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 100%); color: white; padding: 35px 15px; text-align: center; }
        .header h1 { margin: 0; font-size: clamp(1.4em, 4vw, 2.5em); text-shadow: 1px 1px 3px rgba(0,0,0,0.2); line-height: 1.3; }
        .header p { margin-top: 10px; font-size: clamp(0.9em, 2.5vw, 1.1em); opacity: 0.9; }
        
        .countdown-wrapper { display: flex; justify-content: center; margin-top: 25px; margin-bottom: 10px; }
        .countdown-container { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: inline-block; border: 2px solid rgba(255,255,255,0.2); }
        .countdown-container h2 { margin: 0 0 8px 0; font-size: clamp(0.85em, 2.5vw, 1em); text-transform: uppercase; letter-spacing: 0.5px; }
        #countdown { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .time-box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); padding: 4px 10px; border-radius: 6px; min-width: 45px; border: 1px solid rgba(255,255,255,0.2); }
        .time-box span { display: block; font-size: clamp(1.2em, 4vw, 1.6em); font-weight: 800; line-height: 1; margin-bottom: 3px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .time-box small { font-size: 0.65em; text-transform: uppercase; font-weight: 600; opacity: 0.9; }

        .stats-overview-container { max-width: 900px; margin: 20px auto; padding: 0 15px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .stats-box { border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; flex: 1; min-width: 250px; max-width: 350px; transition: transform 0.2s, box-shadow 0.2s; color: white; border: none; }
        .box-exam { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4); }
        .stats-box:hover { transform: translateY(-5px); }
        .box-exam:hover { box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.6); }
        .stats-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8em; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .stats-text { display: flex; flex-direction: column; }
        .stats-label { font-size: 0.95em; color: rgba(255, 255, 255, 0.9); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        .stats-number { font-size: 2.2em; font-weight: 800; color: #FFFFFF; line-height: 1; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        .announcement-container { max-width: 1200px; margin: 0 auto 30px auto; padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .announcement-bar { min-height: 54px; position: relative; overflow: hidden; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; background: linear-gradient(90deg, #1E293B, #475569); color: white; }
        
        .ticker-content { width: 100%; flex-shrink: 0; white-space: normal; text-align: center; font-size: clamp(0.9em, 3.5vw, 1.1em); font-weight: bold; padding: 10px 15px; box-sizing: border-box; opacity: 0; line-height: 1.4; }

        @keyframes slideCenter {
            0% { transform: translateX(100%); opacity: 0; }
            10% { transform: translateX(0); opacity: 1; }
            90% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-100%); opacity: 0; }
        }

        .container { max-width: 1200px; margin: 0 auto 40px auto; padding: 0 15px; position: relative; z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #E5E7EB; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #A5B4FC; }
        .card-title { font-size: 1.15em; font-weight: 700; color: var(--primary); margin: 0 0 15px 0; border-bottom: 2px solid #EEF2FF; padding-bottom: 10px; line-height: 1.4; }
        .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.9em; color: var(--text-muted); }
        .stat-row i { width: 24px; color: #6366F1; text-align: center; margin-right: 8px; }
        .stat-value { font-weight: 600; color: var(--text-main); margin-left: auto; text-align: right; }
        .type-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; color: white; }
        .btn-start { margin-top: auto; padding: 10px; background-color: var(--primary); color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; display: block; transition: all 0.2s; font-size: 0.95em; }
        .btn-start:hover { background-color: var(--primary-hover); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-book-reader"></i> KHO BÀI GIẢNG VÀ TÀI LIỆU TOÁN</h1>
        <p>Giáo viên: Nguyễn Ngọc Tráng - THPT Đào Sơn Tây</p>
        
        <div class="countdown-wrapper">
            <div class="countdown-container">
                <h2><i class="far fa-clock"></i> THỜI GIAN HIỆN TẠI</h2>
                <div style="font-size: 1.1em; font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);" id="current-date">
                    --/--/----
                </div>
                <div id="countdown">
                    <div class="time-box"><span id="rt-hours">00</span><small>Giờ</small></div>
                    <div class="time-box"><span id="rt-minutes">00</span><small>Phút</small></div>
                    <div class="time-box"><span id="rt-seconds">00</span><small>Giây</small></div>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-overview-container">
        <div class="stats-box box-exam">
            <div class="stats-icon"><i class="fas fa-layer-group"></i></div>
            <div class="stats-text">
                <span class="stats-label">Tổng số bài học</span>
                <span class="stats-number" id="global-total-exams">0</span>
            </div>
        </div>
    </div>

    <div class="announcement-container">
        <div class="announcement-bar">
            <div class="ticker-content" id="marquee-exams">
                <i class="fas fa-bullhorn" style="margin-right: 10px; color: #38BDF8;"></i> Hệ thống bài học độc lập trực tuyến môn Toán học.
            </div>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="lesson-grid"></div>
    </div>

    <script>
        // Hiển thị thời gian thực tế
        function updateRealTimeClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const daysOfWeek = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dayOfWeek = daysOfWeek[now.getDay()];
            const date = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            
            document.getElementById('current-date').innerText = `${dayOfWeek}, ngày ${date}/${month}/${year}`;
            document.getElementById('rt-hours').innerText = hours;
            document.getElementById('rt-minutes').innerText = minutes;
            document.getElementById('rt-seconds').innerText = seconds;
        }
        setInterval(updateRealTimeClock, 1000);
        updateRealTimeClock();

        // ---------------------------------------------------------
        // KHU VỰC THẦY CẬP NHẬT DANH SÁCH BÀI HỌC MỚI TẠI ĐÂY
        // ---------------------------------------------------------
        const lessons = [ 
            { 
                fileName: 'bai1_hamso.html', 
                displayName: 'Bài 1: Khảo sát sự biến thiên của hàm số', 
                date: '17/06/2026', 
                type: 'Video Bài Giảng' 
            },
            { 
                fileName: 'bai1_baitap.html', 
                displayName: 'Bài tập trắc nghiệm: Tính đơn điệu hàm số', 
                date: '17/06/2026', 
                type: 'Bài tập Tự luyện' 
            }
        ];
        // ---------------------------------------------------------

        const grid = document.getElementById('lesson-grid');
        document.getElementById('global-total-exams').innerText = lessons.length;

        lessons.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let typeColor = '#3B82F6'; 
            if(lesson.type.includes('Video')) typeColor = '#EF4444'; 
            if(lesson.type.includes('Bài tập')) typeColor = '#10B981'; 
            if(lesson.type.includes('PDF')) typeColor = '#F59E0B'; 

            card.innerHTML = `
                <h3 class="card-title">${lesson.displayName}</h3>
                <div class="stat-row"><i class="far fa-calendar-alt"></i> Ngày đăng: <span class="stat-value">${lesson.date}</span></div>
                <div class="stat-row" style="margin-bottom: 20px;"><i class="fas fa-tags"></i> Phân loại: <span class="stat-value type-badge" style="background-color: ${typeColor};">${lesson.type}</span></div>
                <a href="${lesson.fileName}" class="btn-start"><i class="fas fa-book-open"></i> XEM BÀI HỌC</a>
            `;
            grid.appendChild(card);
        });

        // Hiệu ứng chữ chạy thông báo bài mới
        const duration = 8000; 
        const elExams = document.getElementById('marquee-exams');
        let examItems = lessons.map(lesson => `<i class="fas fa-bookmark" style="margin-right: 10px; color: #38BDF8;"></i> TÀI LIỆU MỚI: ${lesson.displayName}`);
        if(examItems.length === 0) examItems.push(`<i class="fas fa-bullhorn" style="margin-right: 10px; color: #38BDF8;"></i> Hệ thống đang cập nhật bài học...`);

        let idx = 0;
        const playMarquee = () => {
            elExams.innerHTML = examItems[idx];
            elExams.style.animation = 'none';
            void elExams.offsetWidth; 
            elExams.style.animation = `slideCenter ${duration}ms ease-in-out forwards`;
            idx = (idx + 1) % examItems.length;
        };
        playMarquee();
        setInterval(playMarquee, duration);
    </script>
</body>
</html>
